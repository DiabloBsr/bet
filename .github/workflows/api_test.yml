name: Test API Bet261 depuis datacenter
on: workflow_dispatch

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Probe API Sporty-Tech
        run: |
          for lid in 8035 8065; do
            code=$(curl -s -o /tmp/r.json -w "%{http_code}" --max-time 20 \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/125.0 Safari/537.36" \
              -H "Accept: application/json" \
              -H "Origin: https://bet261.mg" \
              -H "Referer: https://bet261.mg/" \
              "https://hg-event-api-prod.sporty-tech.net/api/instantleagues/$lid/matches")
            size=$(wc -c < /tmp/r.json)
            echo "ligue $lid : HTTP $code, ${size} octets"
            head -c 200 /tmp/r.json; echo
          done
